name: Build WebView APK

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'URL do site'
        required: true
      app_name:
        description: 'Nome do app'
        required: true
        default: 'MeuApp'
      package_name:
        description: 'Package name'
        required: true
        default: 'com.apkbuilder.app'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Inject URL and app info
        working-directory: android-builder
        run: |
          sed -i "s|APP_URL_PLACEHOLDER|${{ github.event.inputs.site_url }}|g" \
            app/src/main/java/com/apkbuilder/webview/MainActivity.kt
          sed -i "s|APP_NAME_PLACEHOLDER|${{ github.event.inputs.app_name }}|g" \
            app/src/main/res/values/strings.xml
          sed -i "s|com\.apkbuilder\.webview|${{ github.event.inputs.package_name }}|g" \
            app/build.gradle
          sed -i "s|com\.apkbuilder\.webview|${{ github.event.inputs.package_name }}|g" \
            app/src/main/AndroidManifest.xml
          # Fix package declaration in Kotlin file
          sed -i "1s|package com\.apkbuilder\.webview|package ${{ github.event.inputs.package_name }}|" \
            app/src/main/java/com/apkbuilder/webview/MainActivity.kt

      - name: Generate debug keystore
        working-directory: android-builder
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        working-directory: android-builder
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        working-directory: android-builder
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -1)
          $APKSIGNER sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/app-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk
          path: android-builder/app/build/outputs/apk/release/app-signed.apk
          retention-days: 7
